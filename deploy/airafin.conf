# /etc/nginx/sites-available/airafin.conf
#
# Proxy ALL requests to Docker frontend (127.0.0.1:13080).
# SvelteKit proxies /api/* → backend:3081 internally.
#
# Do NOT add location /api/ → 3081 (strips /api → 404 on dashboard routes).
#
# Port 3080: nginx redirect IP:3080 → airafin (Docker uses 127.0.0.1:13080).
# Port 80/443 on bare IP unchanged (teknodika.com / default server).

server {
    listen 3080;
    listen [::]:3080;
    server_name _;

    return 301 https://airafin.teknodika.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name airafin.teknodika.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name airafin.teknodika.com;

    ssl_certificate /etc/letsencrypt/live/airafin.teknodika.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airafin.teknodika.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:13080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
