services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airafin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airafin}
      POSTGRES_DB: ${POSTGRES_DB:-airafin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port — backend reaches db via Docker network (avoids 5432 conflicts on VPS)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-airafin}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-airafin}:${POSTGRES_PASSWORD:-airafin}@db:5432/${POSTGRES_DB:-airafin}
      API_SECRET_TOKEN: ${API_SECRET_TOKEN:-change-me-in-production}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${GOOGLE_SERVICE_ACCOUNT_FILE:-}
      PORT: 3081
      HOST: 0.0.0.0
    volumes:
      - ./backend/secrets:/app/secrets:ro
      - ./backend/data/import:/app/data/import:ro
    ports:
      - '3081:3081'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:3081
      API_SECRET_TOKEN: ${API_SECRET_TOKEN:-change-me-in-production}
      PORT: 3080
      HOST: 0.0.0.0
      ORIGIN: ${ORIGIN:-http://localhost:3080}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - '3080:3080'

volumes:
  pgdata:
